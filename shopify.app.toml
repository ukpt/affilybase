  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "https://affilybase.com/api/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "https://affilybase.com/api/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "https://affilybase.com/api/webhooks/shop/redact"